paths:
  data_dir: "data/demo_two_data"
  base_log_dir: "log"
  fonts_dir: "fonts"

llm:
  model_id: "gpt-4.1"
  
  # Set your desired endpoint (Official OpenAI or local Qwen)
  base_url: "https://api.openai.com/v1" 
  
  api_key: "OPENAI_API_KEY"

tools:                                            # <--- NEW SECTION
  medgemma:
    use_vllm: true
    vllm_url: "http://localhost:8008/v1"
    vllm_model: "/home/data1/musong/.cache/huggingface/hub/models--google--medgemma-1.5-4b-it/snapshots/e9792da5fb8ee651083d345ec4bce07c3c9f1641"

pipelines:
